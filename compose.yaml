version: "3.9"

services:

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: loganalyzer
    networks:
      - appnet
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis
    networks:
      - appnet

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    volumes:
      - .:/app
    networks:
      - appnet

  worker:
    build: .
    command: celery -A app.celery_app worker --loglevel=info
    depends_on:
      - db
      - redis
    env_file:
      - .env
    volumes:
      - .:/app
    networks:
      - appnet

volumes:
  pgdata:

networks:
  appnet: